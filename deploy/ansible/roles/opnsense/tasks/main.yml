---
- name: Import tasks
  ansible.builtin.include_tasks: "{{ task_file }}"
  loop:
    - vlans.yml
    - aliases.yml
    - rules.yml
    - dnsmasq.yml
    - git.yml
    - qemu.yml
    - mdns.yml
    - prometheus-node-exporter.yml
    - ddclient.yml
    - acme.yml
    - syslog.yml
    # BUG: https://github.com/O-X-L/ansible-opnsense/issues/433
    # - nat.yml
  loop_control:
    loop_var: task_file
