---
- name: Remove Proxmox VE Enterprise repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent

- name: Remove Ceph repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.list
    state: absent

- name: Clear legacy /etc/apt/sources.list
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    content: ""
    mode: "0644"

- name: Remove legacy Debian apt sources
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/ftp_us_debian_org_debian.list
    - /etc/apt/sources.list.d/security_debian_org.list
    - /etc/apt/sources.list.d/download_proxmox_com_debian_pve.list

- name: Add Proxmox VE updates repository
  ansible.builtin.deb822_repository:
    name: pve-no-subscription
    types: deb
    uris: http://download.proxmox.com/debian/pve
    suites: bookworm
    components: pve-no-subscription
    signed_by: https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg

- name: Add Debian repository
  ansible.builtin.deb822_repository:
    name: debian
    types: deb
    uris: http://ftp.us.debian.org/debian
    suites: bookworm
    components: main contrib non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Add Debian updates repository
  ansible.builtin.deb822_repository:
    name: debian-updates
    types: deb
    uris: http://ftp.us.debian.org/debian
    suites: bookworm-updates
    components: main contrib non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Add Debian security repository
  ansible.builtin.deb822_repository:
    name: debian-security
    types: deb
    uris: http://security.debian.org
    suites: bookworm-security
    components: main contrib non-free-firmware
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Update APT repositories
  ansible.builtin.apt:
    update_cache: yes
