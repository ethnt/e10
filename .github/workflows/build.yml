jobs:
  buildARMSystem:
    if: needs.detectChanges.outputs.arm_hosts != '[]'
    name: Build system (ARM)
    needs:
    - detectChanges
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Lix
      uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c
      with:
        extra_nix_config: 'accept-flake-config = true

          max-jobs = auto

          '
    - name: Add SSH keys to ssh-agent
      uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
      with:
        ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}
    - name: Setup Attic cache
      uses: ryanccn/attic-action@1887fd507f03327c96c64cca30118c96eb17fdad
      with:
        cache: e10
        endpoint: https://cache.e10.camp
        token: ${{ secrets.ATTIC_TOKEN }}
    - name: Use Cachix store
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        installCommand: nix profile install github:NixOS/nixpkgs/nixpkgs-unstable#cachix
        name: e10
    - run: 'nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
        --accept-flake-config --show-trace

        '
    strategy:
      matrix:
        host: ${{ fromJson(needs.detectChanges.outputs.arm_hosts) }}
  buildX86System:
    if: needs.detectChanges.outputs.x86_hosts != '[]'
    name: Build system (x86)
    needs:
    - detectChanges
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Lix
      uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c
      with:
        extra_nix_config: 'accept-flake-config = true

          max-jobs = auto

          '
    - name: Add SSH keys to ssh-agent
      uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
      with:
        ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}
    - name: Setup Attic cache
      uses: ryanccn/attic-action@1887fd507f03327c96c64cca30118c96eb17fdad
      with:
        cache: e10
        endpoint: https://cache.e10.camp
        token: ${{ secrets.ATTIC_TOKEN }}
    - name: Use Cachix store
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        installCommand: nix profile install github:NixOS/nixpkgs/nixpkgs-unstable#cachix
        name: e10
    - name: Clean up storage
      run: 'sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

        sudo docker image prune --all --force

        sudo docker builder prune -a

        '
    - run: 'nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
        --accept-flake-config --show-trace

        '
    strategy:
      matrix:
        host: ${{ fromJson(needs.detectChanges.outputs.x86_hosts) }}
  detectChanges:
    name: Detect changed hosts
    outputs:
      arm_hosts: ${{ steps.detect.outputs.arm_hosts }}
      x86_hosts: ${{ steps.detect.outputs.x86_hosts }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Lix
      uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c
      with:
        extra_nix_config: 'accept-flake-config = true

          max-jobs = auto

          '
    - name: Add SSH keys to ssh-agent
      uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
      with:
        ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}
    - name: Setup Attic cache
      uses: ryanccn/attic-action@1887fd507f03327c96c64cca30118c96eb17fdad
      with:
        cache: e10
        endpoint: https://cache.e10.camp
        token: ${{ secrets.ATTIC_TOKEN }}
    - name: Use Cachix store
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        installCommand: nix profile install github:NixOS/nixpkgs/nixpkgs-unstable#cachix
        name: e10
    - id: detect
      name: Detect changed hosts
      run: 'nix run .#detect-changes --accept-flake-config >> "$GITHUB_OUTPUT"

        '
name: Build
'on':
  push: {}
